<!DOCTYPE html>

<html lang="th"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>เช็คชื่อเซิร์ฟเวอร์ TK 2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries">
        let users = JSON.parse(localStorage.getItem("users")) || [];
        let editingIndex = null;

        function renderList() {
            const list = document.getElementById("list");
            const count = document.getElementById("count");
            list.innerHTML = "";
            
            if (users.length === 0) {
                list.innerHTML = `<p class="text-center text-slate-500 py-8 text-sm italic">ยังไม่มีข้อมูล 👾</p>`;
            }

            users.forEach((user, index) => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <img class="profile" src="${user.image}"/>
<div class="card-info flex-1">
<p><strong>Discord:</strong> ${user.discord}</p>
<p><strong>ชื่อเล่น:</strong> ${user.nickname}</p>
<p><strong>อายุ:</strong> ${user.age}</p>
</div>
<button class="!w-auto !p-2 !mt-0 !bg-slate-700 hover:!bg-slate-600 !shadow-none !rounded-xl" onclick="editUser(${index})">
<span>✏️</span>
</button>
                `;
                list.appendChild(card);
            });
            count.innerText = users.length;
        }

        function editUser(index) {
            const user = users[index];
            editingIndex = index;
            
            document.getElementById("discordName").value = user.discord;
            document.getElementById("nickname").value = user.nickname;
            document.getElementById("age").value = user.age;
            
            // Change button text
            document.getElementById("submitBtnText").innerText = "🆙 อัปเดตข้อมูล";
            
            // Scroll to form
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function submitData() {
            const fileInput = document.getElementById("profileImage");
            const file = fileInput.files[0];
            const discord = document.getElementById("discordName").value.trim();
            const nickname = document.getElementById("nickname").value.trim();
            const age = document.getElementById("age").value.trim();

            if (!discord || !nickname || !age) {
                alert("กรุณากรอกข้อมูลให้ครบทุกช่อง! ⚠️");
                return;
            }

            const handleSave = (imageData) => {
                const userData = {
                    image: imageData || (editingIndex !== null ? users[editingIndex].image : ''),
                    discord,
                    nickname,
                    age
                };

                if (editingIndex !== null) {
                    users[editingIndex] = userData;
                    editingIndex = null;
                } else {
                    if (!file) {
                        alert("กรุณาอัพโหลดรูปโปรไฟล์! 📸");
                        return;
                    }
                    users.push(userData);
                }

                localStorage.setItem("users", JSON.stringify(users));
                
                // Reset Form
                fileInput.value = "";
                document.getElementById("discordName").value = "";
                document.getElementById("nickname").value = "";
                document.getElementById("age").value = "";
                document.getElementById("submitBtnText").innerText = "💾 บันทึกข้อมูล";
                
                renderList();
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => handleSave(e.target.result);
                reader.readAsDataURL(file);
            } else {
                handleSave();
            }
        }

        renderList();
    </script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&amp;display=swap" rel="stylesheet"/>
<style>

            background-color: #0d0e14;
            background-image: radial-gradient(circle at 50% 0%, #1a1c2c 0%, #0d0e14 100%);

            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            position: relative;
            overflow-x: hidden;

        /* Subtle mesh pattern overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background-size: 30px 30px;

        .floating-emoji {

            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
            filter: blur(1px);
        }

        /* Glowing accents */
        .glow-accent {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            filter: blur(60px);
            z-index: -1;
            border-radius: 50%;
        }

        .container {
            background: rgba(22, 23, 34, 0.8);
            backdrop-filter: blur(16px);
            padding: 30px 24px;
            margin: 20px auto;
            width: 92%;
            max-width: 420px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 10;
        }

        .top-image {
            width: 130px;
            height: 130px;
            border-radius: 30px;
            margin: 0 auto 24px;
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.25), 0 0 15px rgba(139, 92, 246, 0.3);
            object-fit: cover;
            display: block;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: #1a1b26;
        }

        input[type="text"], input[type="number"], input[type="file"] {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(10, 10, 15, 0.6);
            color: white;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
            background: rgba(15, 15, 25, 0.9);
        }

        /* Custom file input look */
        input[type="file"]::file-selector-button {
            background: rgba(139, 92, 246, 0.1);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            padding: 4px 12px;
            margin-right: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        input[type="file"]::file-selector-button:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        .card {
            margin-top: 15px;
            padding: 16px;
            background: rgba(30, 31, 46, 0.4);
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s;
        }
        
        .card:hover {
            border-color: rgba(139, 92, 246, 0.3);
            background: rgba(30, 31, 46, 0.6);
        }

        img.profile {
            width: 58px;
            height: 58px;
            border-radius: 14px;
            object-fit: cover;
            border: 2px solid #6366f1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .card-info p {
            margin: 1px 0;
            font-size: 13px;
            color: rgba(226, 232, 240, 0.7);
        }
        
        .card-info strong {
            color: #a78bfa;
            font-weight: 500;
        }

        .count-badge {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .header-with-emoji {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
